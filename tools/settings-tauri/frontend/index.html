<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sakura 设置</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="settings-shell">
      <aside class="nav-card" aria-label="设置分类">
        <div class="nav-brand">
          <span class="nav-brand-mark" aria-hidden="true">❀</span>
          <span class="nav-brand-text">Sakura</span>
        </div>
        <nav class="nav-list">
          <button class="nav-item is-active" type="button" data-page="character" aria-current="page">角色与布局</button>
          <button class="nav-item" type="button" data-page="appearance">外观</button>
          <button class="nav-item" type="button" data-page="providers">供应商</button>
          <button class="nav-item" type="button" data-page="model">模型</button>
          <button class="nav-item" type="button" data-page="voice">语音</button>
          <button class="nav-item" type="button" data-page="interaction">交互</button>
          <button class="nav-item" type="button" data-page="privacy">隐私</button>
          <button class="nav-item" type="button" data-page="tools">工具</button>
          <button class="nav-item" type="button" data-page="plugins">插件</button>
          <button class="nav-item" type="button" data-page="system">系统</button>
          <button class="nav-item" type="button" data-page="memory">记忆</button>
        </nav>
      </aside>

      <section class="detail-card">
        <header class="page-head">
          <h1 id="pageTitle" class="page-title">角色与布局</h1>
          <p id="pageSubtitle" class="page-subtitle">选择陪伴角色与桌宠布局</p>
        </header>

        <div class="page-scroll">
        <section id="page-character" class="settings-page is-active">
          <fieldset class="settings-group">
            <legend>角色与桌宠布局</legend>
            <div class="setting-row">
              <label class="setting-row-text" for="characterSelect">
                <span class="setting-title">当前角色</span>
                <span class="setting-desc">切换桌宠使用的角色立绘与人设。</span>
              </label>
              <select id="characterSelect"></select>
            </div>
            <div class="setting-row">
              <label class="setting-row-text" for="portraitScale">
                <span class="setting-title">立绘大小</span>
                <span class="setting-desc">桌面上立绘的整体缩放比例。</span>
              </label>
              <div class="slider-control">
                <input id="portraitScale" class="layout-slider" type="range" step="1" />
                <output class="slider-value" for="portraitScale"></output>
              </div>
            </div>
            <div class="setting-row">
              <label class="setting-row-text" for="controlPanelWidth">
                <span class="setting-title">对话框宽度</span>
                <span class="setting-desc">对话气泡与输入栏的整体宽度。</span>
              </label>
              <div class="slider-control">
                <input id="controlPanelWidth" class="layout-slider" type="range" step="1" />
                <output class="slider-value" for="controlPanelWidth"></output>
              </div>
            </div>
            <div class="setting-row">
              <label class="setting-row-text" for="bubbleHeight">
                <span class="setting-title">气泡高度</span>
                <span class="setting-desc">对话气泡可显示的最大高度。</span>
              </label>
              <div class="slider-control">
                <input id="bubbleHeight" class="layout-slider" type="range" step="1" />
                <output class="slider-value" for="bubbleHeight"></output>
              </div>
            </div>
            <div class="setting-row">
              <label class="setting-row-text" for="controlPanelOffset">
                <span class="setting-title">气泡上下位置</span>
                <span class="setting-desc">气泡相对立绘的纵向位置。</span>
              </label>
              <div class="slider-control">
                <input id="controlPanelOffset" class="layout-slider" type="range" step="1" />
                <output class="slider-value" for="controlPanelOffset"></output>
              </div>
            </div>
            <div class="setting-row">
              <label class="setting-row-text" for="inputBarOffset">
                <span class="setting-title">输入框下移</span>
                <span class="setting-desc">输入栏相对气泡向下偏移的距离。</span>
              </label>
              <div class="slider-control">
                <input id="inputBarOffset" class="layout-slider" type="range" step="1" />
                <output class="slider-value" for="inputBarOffset"></output>
              </div>
            </div>
          </fieldset>
          <fieldset class="settings-group">
            <legend>角色包</legend>
            <div class="setting-row">
              <div class="setting-row-text">
                <span class="setting-title">导入/导出</span>
                <span id="characterArchiveHint" class="setting-desc">管理 Sakura .char 与 .voice 文件。</span>
              </div>
              <div class="archive-controls">
                <button id="characterImportButton" type="button" class="secondary-button">导入 .char</button>
                <button id="ttsVoiceImportButton" type="button" class="secondary-button">导入 .voice</button>
                <button id="characterExportButton" type="button" class="secondary-button">导出</button>
              </div>
            </div>
          </fieldset>
        </section>

        <section id="page-privacy" class="settings-page">
          <fieldset class="settings-group">
            <legend>主动屏幕感知</legend>
            <div class="setting-row">
              <label class="setting-row-text" for="enabled">
                <span class="setting-title">启用主动屏幕感知</span>
                <span class="setting-desc">桌宠定时截屏判断是否主动找你搭话。</span>
              </label>
              <span class="setting-toggle"><input id="enabled" type="checkbox" /></span>
            </div>
            <div class="setting-row">
              <label class="setting-row-text" for="checkInterval">
                <span class="setting-title">主动检查间隔</span>
                <span class="setting-desc">每隔多久截屏检查一次屏幕内容。</span>
              </label>
              <span class="field-unit"><input id="checkInterval" type="number" step="1" /><span class="unit">分钟</span></span>
            </div>
            <div class="setting-row">
              <label class="setting-row-text" for="cooldown">
                <span class="setting-title">主动发言冷却</span>
                <span class="setting-desc">两次主动搭话之间的最短间隔。</span>
              </label>
              <span class="field-unit"><input id="cooldown" type="number" step="1" /><span class="unit">分钟</span></span>
            </div>
            <div class="setting-row">
              <label class="setting-row-text" for="batchLimit">
                <span class="setting-title">单次最多发送截图</span>
                <span class="setting-desc">一次主动感知最多附带的截图张数。</span>
              </label>
              <span class="field-unit"><input id="batchLimit" type="number" step="1" /><span class="unit">张</span></span>
            </div>
            <div class="setting-row">
              <div class="setting-row-text">
                <span class="setting-title">预计图像 token</span>
                <span class="setting-desc">按当前屏幕估算每张截图消耗的 token。</span>
              </div>
              <p id="tokenEstimate" class="hint"></p>
            </div>
          </fieldset>
        </section>

        <section id="page-tools" class="settings-page">
          <fieldset class="settings-group">
            <legend>桌面控制</legend>
            <div class="setting-row">
              <label class="setting-row-text" for="windowsMcp">
                <span class="setting-title">Windows MCP 桌面控制</span>
                <span class="setting-desc">允许桌宠通过 MCP 操作桌面与应用。</span>
              </label>
              <span class="setting-toggle"><input id="windowsMcp" type="checkbox" /></span>
            </div>
          </fieldset>
          <fieldset class="settings-group">
            <legend>工具循环上限</legend>
            <div class="setting-row">
              <label class="setting-row-text" for="agentSteps">
                <span class="setting-title">循环步数</span>
                <span class="setting-desc">单轮对话最多执行的智能体步数。</span>
              </label>
              <span class="field-unit"><input id="agentSteps" type="number" step="1" /><span class="unit">步</span></span>
            </div>
            <div class="setting-row">
              <label class="setting-row-text" for="toolCallsPerStep">
                <span class="setting-title">每步工具数</span>
                <span class="setting-desc">每个步骤内最多调用的工具次数。</span>
              </label>
              <span class="field-unit"><input id="toolCallsPerStep" type="number" step="1" /><span class="unit">次</span></span>
            </div>
            <div class="setting-row">
              <label class="setting-row-text" for="toolCallsPerTurn">
                <span class="setting-title">整轮工具数</span>
                <span class="setting-desc">整轮对话累计的工具调用上限。</span>
              </label>
              <span class="field-unit"><input id="toolCallsPerTurn" type="number" step="1" /><span class="unit">次</span></span>
            </div>
          </fieldset>
        </section>

        <section id="page-plugins" class="settings-page admin-page">
          <div id="pluginStatusStrip" class="admin-strip"></div>
          <div class="admin-toolbar">
            <input id="pluginSearch" class="admin-search" type="text" placeholder="搜索插件、作者、ID" />
            <select id="pluginStatusFilter">
              <option value="all">全部状态</option>
              <option value="enabled">已启用</option>
              <option value="disabled">已禁用</option>
              <option value="required">必需</option>
              <option value="changed">有改动</option>
            </select>
            <select id="pluginPermissionFilter">
              <option value="">全部权限</option>
            </select>
          </div>
          <div class="admin-workbench">
            <div id="pluginList" class="admin-list"></div>
            <aside id="pluginDetail" class="admin-detail"></aside>
          </div>
        </section>

        <section id="page-providers" class="settings-page admin-page">
          <div id="providerStatusStrip" class="admin-strip"></div>
          <div class="admin-toolbar">
            <input id="providerSearch" class="admin-search" type="text" placeholder="搜索供应商、Base URL" />
            <button id="addProviderButton" class="secondary-button" type="button">添加供应商</button>
          </div>
          <div class="admin-workbench">
            <div id="providerList" class="admin-list"></div>
            <aside id="providerDetail" class="admin-detail"></aside>
          </div>
        </section>

        <section id="page-model" class="settings-page">
          <fieldset class="settings-group">
            <legend>模型槽位</legend>
            <div id="modelSlots" class="dynamic-list"></div>
          </fieldset>

          <details class="settings-group advanced-section">
            <summary>高级参数</summary>
            <div class="setting-row">
              <label class="setting-row-text" for="apiTimeout">
                <span class="setting-title">超时 (timeout_seconds)</span>
                <span class="setting-desc">单次请求等待响应的最长时间。</span>
              </label>
              <span class="field-unit"><input id="apiTimeout" type="number" step="1" /><span class="unit">秒</span></span>
            </div>
            <div class="setting-row">
              <label class="setting-row-text" for="apiTemperature">
                <span class="setting-title">创造性 (temperature)</span>
                <span class="setting-desc">越高回复越灵活，越低越稳定（0–2）。</span>
              </label>
              <input id="apiTemperature" type="number" min="0" max="2" step="0.01" />
            </div>
            <div class="setting-row">
              <label class="setting-row-text" for="apiTopP">
                <span class="setting-title">用词多样性 (top_p)</span>
                <span class="setting-desc">通常保持关闭；需要更细地控制回复变化时再开启。</span>
              </label>
              <label class="inline-input">
                <input id="apiTopPEnabled" type="checkbox" />
                <span>自定义</span>
                <input id="apiTopP" type="number" min="0" max="1" step="0.01" />
              </label>
            </div>
            <div class="setting-row">
              <label class="setting-row-text" for="apiMaxTokens">
                <span class="setting-title">回复长度 (max_tokens)</span>
                <span class="setting-desc">通常保持关闭；需要限制单次回复长度时再开启。</span>
              </label>
              <label class="inline-input">
                <input id="apiMaxTokensEnabled" type="checkbox" />
                <span>自定义</span>
                <input id="apiMaxTokens" type="number" step="1" />
              </label>
            </div>
          </details>
        </section>

        <section id="page-voice" class="settings-page">
          <fieldset class="settings-group">
            <legend>TTS 语音</legend>
            <div class="setting-row">
              <label class="setting-row-text" for="ttsEnabled">
                <span class="setting-title">启用 TTS 语音</span>
                <span class="setting-desc">让桌宠用合成语音朗读回复。</span>
              </label>
              <span class="setting-toggle"><input id="ttsEnabled" type="checkbox" /></span>
            </div>
            <div class="setting-row">
              <label class="setting-row-text" for="ttsProvider">
                <span class="setting-title">TTS 提供器</span>
                <span class="setting-desc">选择语音合成的后端引擎。</span>
              </label>
              <select id="ttsProvider"></select>
            </div>
            <div id="ttsBundleNoticeRow" hidden>
              <p id="ttsBundleNotice" class="page-note"></p>
            </div>
            <details class="resource-foldout">
              <summary>
                <span>TTS 整合包</span>
              </summary>
              <div id="ttsResourceCard" class="resource-card"></div>
            </details>
            <input id="ttsConfigPath" type="hidden" />
            <div class="setting-row">
              <div class="setting-row-text">
                <span class="setting-title">语音测试</span>
                <span class="setting-desc">按当前表单配置检测 TTS 服务。</span>
              </div>
              <button id="ttsTestButton" class="secondary-button" type="button">测试语音</button>
            </div>
            <details class="advanced-section">
              <summary>高级参数</summary>
              <div class="setting-row">
                <label class="setting-row-text" for="ttsApiUrl">
                  <span class="setting-title">API URL</span>
                  <span class="setting-desc">TTS 服务的接口地址。</span>
                </label>
                <input id="ttsApiUrl" class="wide-input" type="text" />
              </div>
              <div class="setting-row">
                <label class="setting-row-text" for="ttsWorkDir">
                  <span class="setting-title">工作目录</span>
                  <span class="setting-desc">TTS 引擎运行所在的工作目录路径。</span>
                </label>
                <input id="ttsWorkDir" class="wide-input" type="text" />
              </div>
              <div class="setting-row">
                <label class="setting-row-text" for="ttsPythonPath">
                  <span class="setting-title">TTS Python</span>
                  <span class="setting-desc">运行 TTS 引擎使用的 Python 解释器路径。</span>
                </label>
                <input id="ttsPythonPath" class="wide-input" type="text" />
              </div>
              <div class="setting-row">
                <label class="setting-row-text" for="ttsTimeout">
                  <span class="setting-title">超时</span>
                  <span class="setting-desc">等待语音合成完成的最长时间。</span>
                </label>
                <span class="field-unit"><input id="ttsTimeout" type="number" step="1" /><span class="unit">秒</span></span>
              </div>
            </details>
          </fieldset>
        </section>

        <section id="page-appearance" class="settings-page">
          <fieldset class="settings-group">
            <legend>配色</legend>
            <div id="themeColors" class="theme-colors"></div>
          </fieldset>
          <fieldset class="settings-group">
            <legend>输入栏</legend>
            <div class="setting-row">
              <label class="setting-row-text" for="visualEffectMode">
                <span class="setting-title">外观效果</span>
                <span class="setting-desc">输入栏的毛玻璃 / 透明等视觉风格。</span>
              </label>
              <select id="visualEffectMode"></select>
            </div>
            <div class="setting-row">
              <div class="setting-row-text">
                <span class="setting-title">主题操作</span>
                <span class="setting-desc">根据角色默认立绘生成配色，或恢复角色包默认主题。</span>
              </div>
              <div class="inline-actions">
                <button id="themeAiButton" class="secondary-button" type="button">AI 生成配色</button>
                <button id="resetThemeButton" class="secondary-button" type="button">恢复默认配色</button>
              </div>
            </div>
          </fieldset>
        </section>

        <section id="page-interaction" class="settings-page">
          <fieldset class="settings-group">
            <legend>字幕与回复</legend>
            <div class="setting-row">
              <label class="setting-row-text" for="subtitleTypingInterval">
                <span class="setting-title">字幕逐字间隔</span>
                <span class="setting-desc">字幕逐字显示的间隔时间。</span>
              </label>
              <span class="field-unit"><input id="subtitleTypingInterval" type="number" step="1" /><span class="unit">ms</span></span>
            </div>
            <div class="setting-row">
              <label class="setting-row-text" for="replySegmentPause">
                <span class="setting-title">回复分段停顿</span>
                <span class="setting-desc">多段回复之间的停顿时间。</span>
              </label>
              <span class="field-unit"><input id="replySegmentPause" type="number" step="1" /><span class="unit">ms</span></span>
            </div>
          </fieldset>

          <fieldset class="settings-group">
            <legend>气泡</legend>
            <div class="setting-row">
              <label class="setting-row-text" for="bubbleAutoHide">
                <span class="setting-title">气泡自动隐藏</span>
                <span class="setting-desc">无操作一段时间后自动隐藏气泡。</span>
              </label>
              <span class="setting-toggle"><input id="bubbleAutoHide" type="checkbox" /></span>
            </div>
            <div class="setting-row">
              <label class="setting-row-text" for="bubbleAutoHideDelay">
                <span class="setting-title">无操作时长</span>
                <span class="setting-desc">触发自动隐藏前的无操作时长。</span>
              </label>
              <span class="field-unit"><input id="bubbleAutoHideDelay" type="number" step="1" /><span class="unit">秒</span></span>
            </div>
          </fieldset>

          <fieldset class="settings-group">
            <legend>接话</legend>
            <div class="setting-row">
              <label class="setting-row-text" for="backchannelEnabled">
                <span class="setting-title">启用快速接话</span>
                <span class="setting-desc">在你说话间隙快速给出简短回应。</span>
              </label>
              <span class="setting-toggle"><input id="backchannelEnabled" type="checkbox" /></span>
            </div>
            <div class="setting-row">
              <label class="setting-row-text" for="backchannelMode">
                <span class="setting-title">模式</span>
                <span class="setting-desc">规则更稳，智能辅助会使用本地模型帮助判断。</span>
              </label>
              <select id="backchannelMode">
                <option value="rules">规则</option>
                <option value="hybrid">智能辅助</option>
              </select>
            </div>
            <div class="setting-row">
              <label class="setting-row-text" for="backchannelDelay">
                <span class="setting-title">延迟</span>
                <span class="setting-desc">接话前的等待延迟。</span>
              </label>
              <span class="field-unit"><input id="backchannelDelay" type="number" step="1" /><span class="unit">毫秒</span></span>
            </div>
            <div class="setting-row">
              <label class="setting-row-text" for="backchannelProbability">
                <span class="setting-title">概率</span>
                <span class="setting-desc">命中接话的概率（0–1）。</span>
              </label>
              <input id="backchannelProbability" type="number" min="0" max="1" step="0.01" />
            </div>
            <div class="setting-row">
              <label class="setting-row-text" for="backchannelTtsEnabled">
                <span class="setting-title">接话语音</span>
                <span class="setting-desc">接话时同时播放 TTS。</span>
              </label>
              <span class="setting-toggle"><input id="backchannelTtsEnabled" type="checkbox" /></span>
            </div>
            <details class="resource-foldout">
              <summary>
                <span>接话模型</span>
              </summary>
              <div id="backchannelResourceCard" class="resource-card"></div>
            </details>
          </fieldset>
        </section>

        <section id="page-system" class="settings-page">
          <fieldset class="settings-group">
            <legend>启动</legend>
            <div class="setting-row">
              <label class="setting-row-text" for="launchAtLogin">
                <span class="setting-title">开机自启动</span>
                <span class="setting-desc">登录系统后自动启动 Sakura。</span>
              </label>
              <span class="setting-toggle"><input id="launchAtLogin" type="checkbox" /></span>
            </div>
          </fieldset>

          <fieldset class="settings-group">
            <legend>调试日志</legend>
            <div class="setting-row">
              <label class="setting-row-text" for="debugLogEnabled">
                <span class="setting-title">终端调试日志</span>
                <span class="setting-desc">在终端输出运行调试日志。</span>
              </label>
              <span class="setting-toggle"><input id="debugLogEnabled" type="checkbox" /></span>
            </div>
            <div class="setting-row">
              <label class="setting-row-text" for="debugBodyEnabled">
                <span class="setting-title">完整请求 / 回复正文</span>
                <span class="setting-desc">日志中包含完整的请求与回复正文。</span>
              </label>
              <span class="setting-toggle"><input id="debugBodyEnabled" type="checkbox" /></span>
            </div>
            <div class="setting-row">
              <label class="setting-row-text" for="debugFileEnabled">
                <span class="setting-title">文件运行日志</span>
                <span class="setting-desc">把运行日志额外写入文件。</span>
              </label>
              <span class="setting-toggle"><input id="debugFileEnabled" type="checkbox" /></span>
            </div>
            <div class="setting-row">
              <label class="setting-row-text" for="stageDebugOverlay">
                <span class="setting-title">显示舞台调试框</span>
                <span class="setting-desc">在桌面叠加舞台调试边框。</span>
              </label>
              <span class="setting-toggle"><input id="stageDebugOverlay" type="checkbox" /></span>
            </div>
            <div class="setting-row">
              <label class="setting-row-text" for="stageCollisionMask">
                <span class="setting-title">舞台碰撞贴合</span>
                <span class="setting-desc">按碰撞区域贴合舞台边界。</span>
              </label>
              <span class="setting-toggle"><input id="stageCollisionMask" type="checkbox" /></span>
            </div>
          </fieldset>
        </section>

        <section id="page-memory" class="settings-page admin-page">
          <div class="admin-topline">
            <div id="memoryStatusStrip" class="admin-strip"></div>
            <div class="admin-mini-panel">
              <label class="compact-number" for="memoryTriggerTurns">
                <span>自动整理频率</span>
                <input id="memoryTriggerTurns" type="number" step="1" />
                <span class="unit">轮</span>
              </label>
            </div>
          </div>
          <details class="resource-foldout">
            <summary>
              <span>记忆模型</span>
            </summary>
            <div id="memoryModelResourceCard" class="resource-card"></div>
          </details>
          <div class="admin-toolbar">
            <input id="memorySearch" class="admin-search" type="text" placeholder="搜索内容、ID、分类、来源" />
            <select id="memoryLayerFilter"></select>
            <select id="memorySort">
              <option value="updated_desc">最近更新</option>
              <option value="importance_desc">重要性</option>
              <option value="confidence_desc">置信度</option>
            </select>
            <button id="memoryAddButton" class="secondary-button" type="button">新增记忆</button>
            <button id="memoryRefreshButton" class="secondary-button" type="button">刷新</button>
          </div>
          <div class="admin-workbench">
            <div id="memoryList" class="admin-list"></div>
            <aside class="admin-detail">
              <textarea id="memoryContent" class="memory-editor" placeholder="选择左侧记忆后编辑"></textarea>
              <div class="detail-grid">
                <label>
                  <span>层级</span>
                  <select id="memoryLayer"></select>
                </label>
                <label>
                  <span>分类</span>
                  <input id="memoryCategory" type="text" />
                </label>
                <label>
                  <span>来源</span>
                  <input id="memorySource" type="text" />
                </label>
                <label>
                  <span>重要性</span>
                  <input id="memoryImportance" type="number" min="0" max="1" step="0.05" />
                </label>
                <label>
                  <span>置信度</span>
                  <input id="memoryConfidence" type="number" min="0" max="1" step="0.05" />
                </label>
              </div>
              <dl id="memoryMeta" class="detail-meta"></dl>
              <div class="detail-actions">
                <button id="memorySaveButton" type="button">保存记忆</button>
                <button id="memoryRevertButton" class="secondary-button" type="button">还原</button>
                <button id="memoryDeleteButton" class="danger-button" type="button">删除</button>
              </div>
            </aside>
          </div>
        </section>
        </div>

        <footer>
          <div class="footer-status">
            <span class="dirty-flag">● 有未保存的改动</span>
            <p id="errorText" class="error" role="alert"></p>
          </div>
          <button id="cancelButton" class="secondary-button" type="button">取消</button>
          <button id="applyButton" class="secondary-button" type="button">应用</button>
          <button id="saveButton" type="button">保存并关闭</button>
        </footer>
      </section>
    </main>

    <div id="toastStack" class="toast-stack" aria-live="polite"></div>

    <script src="./settings.js"></script>
  </body>
</html>
